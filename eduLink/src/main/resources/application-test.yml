spring:
  datasource:
    # 1. Added DB_CLOSE_DELAY=-1 to keep the DB alive even if connections close
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # 2. Changed 'create-drop' to 'update' or 'none'
      # so it doesn't delete tables on shutdown
      ddl-auto: update
    show-sql: true
    # 3. Ensures the connection isn't held open unnecessarily long
    properties:
      hibernate.connection.handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

logging:
  file:
    name: /logs/application.log
  level:
    root: INFO
    com.cts.eduLink: DEBUG
    org.springframework.web: INFO

server:
  port: 8081